<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Expense Tracker</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    <style>
        /* CSS Variables for Light and Dark Themes */
        :root {
            --bg-color: #F9FAFB;
            --text-color: #374151;
            --primary-color: #4F46E5;
            --secondary-color: #6B7280;
            --accent-color: #10B981;
            --table-bg: #FFFFFF;
            --table-hover: #F3F4F6;
            --box-shadow: 0 10px 20px rgba(0, 0, 0, 0.05);
            --border-color: #E5E7EB;
            --font-family: 'Inter', sans-serif;
        }

        [data-theme="dark"] {
            --bg-color: #1F2937;
            --text-color: #F3F4F6;
            --primary-color: #6366F1;
            --secondary-color: #9CA3AF;
            --accent-color: #34D399;
            --table-bg: #374151;
            --table-hover: #4B5563;
            --box-shadow: 0 10px 20px rgba(0, 0, 0, 0.25);
            --border-color: #4B5563;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            transition: background-color 0.3s, color 0.3s;
            line-height: 1.6;
        }

        /* Dashboard Layout */
        .dashboard-container {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .header {
            background-color: var(--bg-color);
            padding: 20px 30px;
            text-align: center;
            color: var(--text-color);
            box-shadow: var(--box-shadow);
            position: sticky;
            top: 0;
            z-index: 5;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
        }

        .header h1 {
            font-family: 'Poppins', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary-color);
            margin: 0;
            transition: color 0.3s;
        }

        .controls-container {
            background-color: var(--bg-color);
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .controls input,
        .controls button {
            padding: 12px 20px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            font-size: 16px;
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.3s, color 0.3s, border-color 0.3s;
            outline: none;
            min-width: 150px;
            text-align: center;
        }

        .controls button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            transition: 0.2s ease;
            cursor: pointer;
            box-shadow: var(--box-shadow);
            font-weight: 500;
        }

        .controls button:hover {
            background-color: var(--secondary-color);
            transform: scale(1.03);
        }

        .main-content {
            padding: 30px;
            overflow: auto;
            flex-grow: 1;
        }

        /* Dark Mode Toggle */
        .dark-mode-toggle {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-color);
            transition: color 0.3s;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 28px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 28px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 20px;
            width: 20px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked+.slider {
            background-color: var(--primary-color);
        }

        input:focus+.slider {
            box-shadow: 0 0 2px var(--primary-color);
        }

        input:checked+.slider:before {
            transform: translateX(22px);
        }

        /* Add Button */
        .add-btn {
            background-color: var(--accent-color);
            border: none;
            padding: 14px 28px;
            color: white;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 500;
            transition: transform 0.2s, background 0.2s;
            margin-bottom: 20px;
            box-shadow: var(--box-shadow);
            display: block;
            margin: 20px auto;
            max-width: 200px;
            font-size: 1.1rem;
        }

        .add-btn:hover {
            filter: brightness(0.9);
            transform: scale(1.05);
        }

        /* Table */
        table {
            width: 100%;
            border-collapse: collapse;
            background-color: var(--table-bg);
            color: var(--text-color);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: var(--box-shadow);
            transition: background-color 0.3s, color 0.3s;
            border: 1px solid var(--border-color);
        }

        th,
        td {
            padding: 14px 18px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }

        th {
            background-color: var(--primary-color);
            color: white;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: background-color 0.3s;
        }

        tr:hover {
            background-color: var(--table-hover);
            transition: background 0.2s;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 20;
            padding-top: 80px;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0, 0, 0, 0.4);
        }

        .modal-content {
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: auto;
            padding: 30px;
            border-radius: 12px;
            width: 90%;
            max-width: 600px;
            position: relative;
            animation: fadeIn 0.4s ease-out;
            box-shadow: var(--box-shadow);
            transition: background-color 0.3s, color 0.3s;
            border: 1px solid var(--border-color);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-content h2 {
            font-family: 'Poppins', sans-serif;
            margin-bottom: 20px;
            color: var(--text-color);
            font-size: 1.75rem;
            transition: color 0.3s;
        }

        .modal-content input,
        .modal-content select,
        .modal-content button {
            width: 100%;
            margin: 12px 0;
            padding: 14px;
            font-size: 16px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.3s, color 0.3s, border-color 0.3s;
            outline: none;
        }

        .modal-content button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            transition: background 0.3s ease;
            cursor: pointer;
            box-shadow: var(--box-shadow);
            font-weight: 500;
        }

        .modal-content button:hover {
            filter: brightness(0.9);
        }

        .close {
            color: var(--secondary-color);
            position: absolute;
            right: 20px;
            top: 15px;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.3s;
        }

        .close:hover {
            color: var(--text-color);
        }

        /* Summary Card */
        .summary-card {
            text-align: center;
            margin-bottom: 25px;
            font-size: 18px;
            font-weight: 500;
            color: var(--primary-color);
            background-color: var(--table-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: var(--box-shadow);
            transition: background-color 0.3s, color 0.3s;
            border: 1px solid var(--border-color);
        }

        /* Chart */
        .chart-container {
            width: 100%;
            max-width: 500px;
            height: 400px;
            margin: 0 auto 30px;
            background-color: var(--table-bg);
            padding: 15px;
            border-radius: 10px;
            box-shadow: var(--box-shadow);
            transition: background-color 0.3s;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                align-items: center;
                padding: 15px;
            }

            .header h1 {
                margin-bottom: 10px;
            }

            .controls {
                flex-direction: column;
                align-items: stretch;
            }

            .controls input,
            .controls button {
                min-width: auto;
                width: 100%;
            }
        }

        /* Action Buttons (Edit/Delete) */
        td button {
            padding: 10px 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
            transition: background-color 0.2s;
            margin-right: 5px;
            color: white;
            font-weight: 500;
        }

        td button:first-child {
            background-color: #F59E0B;
            /* Amber for Edit */
        }

        td button:first-child:hover {
            background-color: #D97706;
        }

        td button:last-child {
            background-color: #EF4444;
            /* Red for Delete */
        }

        td button:last-child:hover {
            background-color: #DC2626;
        }
        #suggestions{
position:absolute;
background:#2c3440;
border-radius:6px;
width:200px;
z-index:1000;
}

#suggestions div{
padding:6px;
cursor:pointer;
}

#suggestions div:hover{
background:#3a4453;
}
    </style>
</head>

<body>
    <div class="dashboard-container">
        <header class="header">
            <h1><i class="fas fa-wallet"></i> Expense Tracker</h1>
            <div class="dark-mode-toggle">
                <label class="switch">
                    <input type="checkbox" id="darkModeToggle">
                    <span class="slider"></span>
                </label>
                <span>Dark Mode</span>
            </div>
        </header>

        <div class="controls-container">
            <button class="add-btn" onclick="toggleForm()">+ Add Expense</button>
            <div class="controls">
                <input type="text" id="filterCategory" placeholder="Filter Category" onkeyup="showSuggestions()">
                <div id="suggestions"></div>
                <button onclick="filterByCategory()">Filter</button>
                <button onclick="showAll()">View All (Chronological)</button>
                <button onclick="showTotal()">Total</button>
                <button onclick="showCategoryTotals()">Summary</button>
                <button onclick="sortExpensesByAmount('desc')">Amount ↓</button>
                <button onclick="sortExpensesByAmount('asc')">Amount ↑</button>
                <button onclick="showDailyExpenses()">Daily</button>
                <button onclick="showMonthlyExpenses()">Monthly</button>
                <button onclick="exportToCSV()">Export CSV</button>
                <button onclick="exportToJSON()">Export JSON</button>
                <button onclick="showTopExpenses()">Top Expenses</button>
            </div>
        </div>

        <main class="main-content">
            <div class="summary-card" id="summary"></div>
            <div class="chart-container">
                <canvas id="expenseChart"></canvas>
            </div>

            <table id="expenseTable">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Category</th>
                        <th>Amount</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </main>

        <!-- Add/Edit Modals remain the same -->
        <div id="formModal" class="modal">
            <div class="modal-content">
                <span class="close" onclick="toggleForm()">×</span>
                <form id="expenseForm">
                    <h2>Add New Expense</h2>
                    <input type="text" id="category" placeholder="Category" required>
                    <input type="number" id="amount" placeholder="Amount" required>
                    <input type="date" id="date" required>
                    <label for="currency">Currency:</label>
                    <select id="currency">
                        <option value="USD">USD</option>
                        <option value="EUR">EUR</option>
                        <option value="GBP">GBP</option>
                        <option value="INR">INR</option>
                    </select>
                    <button type="submit">Add</button>
                </form>
            </div>
        </div>

        <div id="editModal" class="modal">
            <div class="modal-content">
                <span class="close" onclick="toggleEditForm()">×</span>
                <form id="editExpenseForm">
                    <h2>Edit Expense</h2>
                    <input type="hidden" id="editIndex">
                    <input type="text" id="editCategory" placeholder="Category" required>
                    <input type="number" id="editAmount" placeholder="Amount" required>
                    <input type="date" id="editDate" required>
                    <label for="editCurrency">Currency:</label>
                    <select id="editCurrency">
                        <option value="USD">USD</option>
                        <option value="EUR">EUR</option>
                        <option value="GBP">GBP</option>
                        <option value="INR">INR</option>
                    </select>
                    <button type="submit">Update</button>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        let expenses = JSON.parse(localStorage.getItem("expenses")) || [];
        // -------- TRIE DATA STRUCTURE --------
class TrieNode{
    constructor(){
        this.children={}
        this.end=false
    }
}

class Trie{
    constructor(){
        this.root=new TrieNode()
    }

    insert(word){
        let node=this.root
        for(let c of word.toLowerCase()){
            if(!node.children[c]){
                node.children[c]=new TrieNode()
            }
            node=node.children[c]
        }
        node.end=true
    }

    searchPrefix(prefix){
        let node=this.root

        for(let c of prefix.toLowerCase()){
            if(!node.children[c]) return []
            node=node.children[c]
        }

        let results=[]

        function dfs(n,str){
            if(n.end) results.push(str)

            for(let ch in n.children){
                dfs(n.children[ch],str+ch)
            }
        }

        dfs(node,prefix.toLowerCase())

        return results
    }
}

const categoryTrie=new Trie()
        let currentTheme = localStorage.getItem("theme") || "light";
        let chart;

        // --- Core Data Logic ---

        // NEW: Function to sort expenses by date. This mimics the C++ multimap's
        // primary behavior of keeping data ordered by a key (date).
        function sortExpensesByDefault() {
            expenses.sort((a, b) => new Date(a.date) - new Date(b.date));
        }
        
        // UPDATED: Handle form submission
        document.getElementById("expenseForm").addEventListener("submit", function(e) {
            e.preventDefault();
            const newExpense = {
                category: document.getElementById("category").value.trim(),
                amount: parseFloat(document.getElementById("amount").value),
                date: document.getElementById("date").value,
                currency: document.getElementById("currency").value
            };

            if (!newExpense.category || isNaN(newExpense.amount) || !newExpense.date) {
                alert("Please fill all fields correctly.");
                return;
            }

            expenses.push(newExpense);
            categoryTrie.insert(newExpense.category);
            // After adding, immediately re-sort the array to maintain chronological order.
            sortExpensesByDefault(); 
            
            localStorage.setItem("expenses", JSON.stringify(expenses));
            this.reset();
            toggleForm();
            showAll(); // showAll now displays the newly sorted list
            showSummary("✅ Expense added successfully!");
        });

        // UPDATED: Handle edit form submission
        document.getElementById("editExpenseForm").addEventListener("submit", function(e) {
            e.preventDefault();
            const index = document.getElementById("editIndex").value;
            expenses[index] = {
                category: document.getElementById("editCategory").value.trim(),
                amount: parseFloat(document.getElementById("editAmount").value),
                date: document.getElementById("editDate").value,
                currency: document.getElementById("editCurrency").value
            };
            
            // Re-sort after editing as the date might have changed.
            sortExpensesByDefault();

            localStorage.setItem("expenses", JSON.stringify(expenses));
            toggleEditForm();
            showAll();
            showSummary("✅ Expense updated successfully!");
        });

        // --- Table Rendering and Display ---

        // UPDATED: Renders the table. Since `expenses` is always sorted by date, this function
        // now naturally displays expenses in chronological order.
        function renderTable(expenseArray) {
            const table = document.querySelector("#expenseTable tbody");
            table.innerHTML = "";
            expenseArray.forEach((exp) => {
                const originalIndex = expenses.indexOf(exp); // Find original index for actions
                let row = `<tr>
                            <td>${exp.date}</td>
                            <td>${exp.category}</td>
                            <td>${exp.amount.toFixed(2)} ${exp.currency}</td>
                            <td>
                                <button onclick="editExpense(${originalIndex})">Edit</button>
                                <button onclick="deleteExpense(${originalIndex})">Delete</button>
                            </td>
                        </tr>`;
                table.innerHTML += row;
            });
        }
        
        function showAll() {
            renderTable(expenses); // Simply render the main `expenses` array
            clearSummary();
            updateChart();
        }

        // UPDATED: Sorts a *copy* of the expenses by amount for temporary viewing.
        // The main `expenses` array remains sorted by date.
        function sortExpensesByAmount(direction) {
            let sorted = [...expenses]; // Create a copy to sort
            if (direction === "desc") {
                sorted.sort((a, b) => b.amount - a.amount);
            } else if (direction === "asc") {
                sorted.sort((a, b) => a.amount - b.amount);
            }
            renderTable(sorted); // Render the temporarily sorted copy
            clearSummary();
        }

        // UPDATED: Filter function now uses the main render function
        function filterByCategory(){

const prefix=document.getElementById("filterCategory").value

const categories=categoryTrie.searchPrefix(prefix)

const filtered=expenses.filter(e =>
    categories.includes(e.category.toLowerCase())
)

renderTable(filtered)

}
        
        // --- Other Functionalities (largely unchanged but benefit from sorted data) ---

        function deleteExpense(index) {
            if (confirm("Are you sure you want to delete this expense?")) {
                expenses.splice(index, 1);
                // No need to re-sort, as relative order is maintained.
                localStorage.setItem("expenses", JSON.stringify(expenses));
                showAll();
                showSummary("❌ Expense deleted successfully!");
            }
        }
        
        function showTotal() {
            const total = expenses.reduce((sum, exp) => sum + exp.amount, 0);
            const currency = expenses.length > 0 ? expenses[0].currency : 'USD';
            showSummary(`💰 Total Expenses: ${total.toFixed(2)} ${currency}`);
        }

        function showCategoryTotals() {
            const totals = {};
            expenses.forEach(exp => {
                totals[exp.category] = (totals[exp.category] || 0) + exp.amount;
            });

            let output = "📊 Category Totals:<br>";
            if (Object.keys(totals).length === 0) {
                output += "No expenses to summarize.";
            } else {
                for (let cat in totals) {
                    const currency = expenses.find(exp => exp.category === cat)?.currency || 'USD';
                    output += `🔹 ${cat}: ${totals[cat].toFixed(2)} ${currency}<br>`;
                }
            }
            showSummary(output);
        }
        
        function showSummary(message) {
            document.getElementById("summary").innerHTML = message;
        }

        function clearSummary() {
            document.getElementById("summary").innerHTML = "";
        }

        function updateChart() {
            const categoryTotals = {};
            expenses.forEach(exp => {
                categoryTotals[exp.category] = (categoryTotals[exp.category] || 0) + exp.amount;
            });

            const labels = Object.keys(categoryTotals);
            const data = Object.values(categoryTotals);
            const ctx = document.getElementById('expenseChart').getContext('2d');

            if (chart) chart.destroy();
            
            const textColor = document.documentElement.getAttribute("data-theme") === "dark" ? '#F3F4F6' : '#374151';

            chart = new Chart(ctx, {
                type: 'pie',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Expense Distribution',
                        data: data,
                        backgroundColor: ['#6366F1', '#10B981', '#F59E0B', '#EF4444', '#8B5CF6', '#EC4899'],
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'bottom', labels: { color: textColor }},
                        title: { display: true, text: 'Expense Distribution by Category', color: textColor }
                    }
                }
            });
        }
        
        // --- Setup and Helper functions (Unchanged) ---
        const darkModeToggle = document.getElementById("darkModeToggle");
        
        function setTheme(theme) {
            document.documentElement.setAttribute("data-theme", theme);
            localStorage.setItem("theme", theme);
            currentTheme = theme;
            if (chart) updateChart();
        }

        setTheme(currentTheme);
        darkModeToggle.checked = currentTheme === "dark";
        darkModeToggle.addEventListener("change", () => setTheme(darkModeToggle.checked ? "dark" : "light"));
        
        function toggleForm() {
            document.getElementById("formModal").style.display = document.getElementById("formModal").style.display === "block" ? "none" : "block";
        }

        function toggleEditForm() {
            document.getElementById("editModal").style.display = document.getElementById("editModal").style.display === "block" ? "none" : "block";
        }
        
        function editExpense(index) {
            const expense = expenses[index];
            document.getElementById("editIndex").value = index;
            document.getElementById("editCategory").value = expense.category;
            document.getElementById("editAmount").value = expense.amount;
            document.getElementById("editDate").value = expense.date;
            document.getElementById("editCurrency").value = expense.currency;
            toggleEditForm();
        }
        
        // Unchanged export and period-specific functions
        function showDailyExpenses() {
            const today = new Date().toISOString().slice(0, 10);
            const dailyExpenses = expenses.filter(exp => exp.date === today);
            renderTable(dailyExpenses);
        }

        function showMonthlyExpenses() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const monthlyExpenses = expenses.filter(exp => exp.date.startsWith(`${year}-${month}`));
            renderTable(monthlyExpenses);
        }
        
        function exportToCSV() {
            if (expenses.length === 0) { alert("No data to export."); return; }
            const header = "Date,Category,Amount,Currency\n";
            const csv = header + expenses.map(e => `${e.date},${e.category},${e.amount},${e.currency}`).join("\n");
            const blob = new Blob([csv], { type: "text/csv" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = "expenses.csv";
            a.click();
            URL.revokeObjectURL(url);
        }

        function exportToJSON() {
            if (expenses.length === 0) { alert("No data to export."); return; }
            const json = JSON.stringify(expenses, null, 2);
            const blob = new Blob([json], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = "expenses.json";
            a.click();
            URL.revokeObjectURL(url);
        }
        // -------- HEAP (TOP EXPENSES - PRIORITY QUEUE) --------
function showTopExpenses(){

    let heap=[...expenses]

    // simulate max heap
    heap.sort((a,b)=>b.amount-a.amount)

    let top=heap.slice(0,5)

    renderTable(top)

    showSummary("Top 5 Highest Expenses (Heap Priority Queue)")
}
function showSuggestions(){

let input=document.getElementById("filterCategory").value

if(input.length===0){
document.getElementById("suggestions").innerHTML=""
return
}

let results=categoryTrie.searchPrefix(input)

let html=""

results.forEach(r=>{
html+=`<div onclick="selectSuggestion('${r}')">${r}</div>`
})

document.getElementById("suggestions").innerHTML=html

}
function selectSuggestion(word){

document.getElementById("filterCategory").value=word

document.getElementById("suggestions").innerHTML=""
